<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trinetra Master Terminal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #000; --card: #0c0c0c; --border: #ffcf00; --gold: #ffcf00;
            --green: #00c853; --red: #ff3d00; --text: #ffffff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; border-radius: 0 !important; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        header { padding: 12px 15px; background: #000; border-bottom: 1.5px solid var(--gold); display: flex; justify-content: space-between; align-items: center; z-index: 1001; }
        header h1 { font-size: 16px; color: var(--gold); letter-spacing: 2px; }

        .page { display: none; flex: 1; overflow-y: auto; padding-bottom: 80px; width: 100%; }
        .active-page { display: flex; flex-direction: column; }

        /* NOTIFICATION DRAWER */
        .notif-drawer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 9999; pointer-events: none; }
        .notif-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); opacity: 0; transition: 0.2s; pointer-events: auto; display:none; }
        .notif-panel { position: absolute; top: 0; left: 0; width: 100%; max-height: 75vh; background: #0a0a0a; border-bottom: 3px solid var(--gold); transform: translateY(-100%); transition: 0.3s; pointer-events: auto; display: flex; flex-direction: column; }
        .notif-drawer.active .notif-overlay { display: block; opacity: 1; }
        .notif-drawer.active .notif-panel { transform: translateY(0); }

        /* GRID & CHART */
        .signal-grid { display: grid; grid-template-rows: repeat(3, 1fr); gap: 10px; padding: 10px; flex: 1; }
        .row-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .box { background: var(--card); border: 1px solid #222; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        #main-svg { background: #000; width: 100%; height: 300px; display: block; }

        nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: #000; border-top: 1.5px solid #222; display: grid; grid-template-columns: repeat(5, 1fr); }
        .n-tab { display: flex; flex-direction: column; align-items: center; justify-content: center; color: #666; text-decoration: none; font-size: 10px; }
        .n-tab.active { color: var(--gold); }
    </style>
</head>
<body>

    <header>
        <h1>🔱 TRINETRA</h1>
        <div onclick="toggleNotif()" style="position:relative; cursor:pointer;">
            <i class="fas fa-bell" style="color:var(--gold); font-size:20px;"></i>
        </div>
    </header>

    <div id="notifDrawer" class="notif-drawer">
        <div class="notif-overlay" onclick="toggleNotif()"></div>
        <div class="notif-panel">
            <div style="padding:15px; border-bottom:1px solid var(--gold); color:var(--gold);">🔔 Live Signals</div>
            <div id="notifList" style="padding:10px;"></div>
            <button onclick="toggleNotif()" style="padding:15px; background:var(--gold); color:black; border:none;">CLOSE</button>
        </div>
    </div>

    <div id="page-home" class="page active-page">
        <div class="signal-grid">
            <div class="row-3"><div class="box">⚡ METER</div><div class="box">📈 INDEX</div><div class="box">📊 VOL</div></div>
            <div class="row-3"><div class="box">🔱 BMS</div><div class="box">🦚 SUDAR</div><div class="box">🗡️ TRISHUL</div></div>
            <div class="row-3"><div class="box">🚐 ALL-IN</div><div class="box">📊 SCAN</div><div class="box">📏 SCALE</div></div>
        </div>
    </div>

    <div id="page-chart" class="page">
        <div style="padding:10px; color:var(--gold); font-weight:bold;">RELIANCE CHART</div>
        <svg id="main-svg"></svg>
        <div id="ind-grid" style="display:grid; grid-template-columns:repeat(4,1fr); gap:2px; padding:5px;"></div>
    </div>

    <div id="page-list" class="page">
        <div id="stock-list-container"></div>
    </div>

    <div id="page-control" class="page">
        <div style="padding:20px; border:1px solid var(--gold); margin:10px; text-align:center;">
            <h2 style="color:var(--gold);">NET P&L: +12,450</h2>
        </div>
    </div>

    <nav>
        <a href="javascript:void(0)" class="n-tab active" onclick="showPage('page-home', this)"><i class="fas fa-home"></i>HOME</a>
        <a href="javascript:void(0)" class="n-tab" onclick="showPage('page-home', this)"><i class="fas fa-satellite-dish"></i>SIGNAL</a>
        <a href="javascript:void(0)" class="n-tab" onclick="showPage('page-chart', this)"><i class="fas fa-chart-bar"></i>CHART</a>
        <a href="javascript:void(0)" class="n-tab" onclick="showPage('page-list', this)"><i class="fas fa-list-ul"></i>LIST</a>
        <a href="javascript:void(0)" class="n-tab" onclick="showPage('page-control', this)"><i class="fas fa-cog"></i>ADMIN</a>
    </nav>

    <script>
        function showPage(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.getElementById(id).classList.add('active-page');
            document.querySelectorAll('.n-tab').forEach(t => t.classList.remove('active'));
            if(el) el.classList.add('active');
            if(id === 'page-chart') drawChart();
        }

        function toggleNotif() {
            document.getElementById('notifDrawer').classList.toggle('active');
        }

        function drawChart() {
            const svg = document.getElementById('main-svg');
            svg.innerHTML = '<line x1="0" y1="150" x2="100%" y2="150" stroke="#222" /><text x="10" y="20" fill="var(--gold)">LIVE FEED...</text>';
            // Actual Drawing Logic here
        }

        window.onload = () => {
            console.log("Trinetra Terminal Ready.");
        };
    </script>
</body>
</html>
