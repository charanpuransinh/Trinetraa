<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Trinetra — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
:root {
  /* Original golden yellow — Trishul classic */
  --gold:#f5c518; --gold2:#c9a000;
  --bg:#0a0a0a; --bg3:#1a1a1a; --bg4:#222;
  --border:#2a2a2a; --bordergold:#3d3000;
  --text:#eee; --dim:#888; --dark:#444;
  --green:#00c853; --red:#ff3d3d;
  --r:10px;
}
html,body { height:100%; background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; overflow:hidden; position:fixed; width:100%; }

.screen {
  height:100vh; max-width:420px; margin:0 auto;
  display:flex; flex-direction:column;
  background:var(--bg); overflow:hidden; position:relative;
}
.topline { position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,transparent,var(--gold),transparent); z-index:5; }

/* PANIC TRISHUL ICON — top-right corner */
.panic-trishul {
  position:absolute; top:8px; right:10px; z-index:10;
  width:34px; height:34px;
  background:linear-gradient(135deg,#7a0000,var(--red));
  border:1px solid rgba(255,61,61,0.6);
  border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:18px; cursor:pointer;
  box-shadow:0 2px 10px rgba(255,61,61,0.4);
  animation:panicPulse 2s ease-in-out infinite;
}
.panic-trishul:active { transform:scale(0.92); }
@keyframes panicPulse {
  0%,100% { box-shadow:0 2px 10px rgba(255,61,61,0.35); }
  50% { box-shadow:0 2px 16px rgba(255,61,61,0.7); }
}

/* HEADER */
.header {
  flex-shrink:0; text-align:center;
  padding:12px 20px 8px;
  background:linear-gradient(180deg,rgba(245,197,24,0.07) 0%,transparent 100%);
  border-bottom:1px solid var(--bordergold);
}
.trinetra { font-size:30px; display:inline-block; margin-bottom:2px;
  filter:drop-shadow(0 0 12px rgba(245,197,24,0.5));
  animation:float 3s ease-in-out infinite; }
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }
.app-name { font-family:'Rajdhani',sans-serif; font-size:17px; font-weight:700; color:var(--gold); letter-spacing:3px; }
.app-sub { font-size:8px; color:var(--dim); letter-spacing:2px; margin-top:1px; }

/* FORM */
.form-area {
  flex:1; padding:8px 14px 6px;
  display:flex; flex-direction:column; gap:5px;
  overflow:hidden; min-height:0;
}

.label { font-family:'Rajdhani',sans-serif; font-size:9px; font-weight:700; color:var(--gold); letter-spacing:1.5px; margin-bottom:2px; display:block; }
.input-wrap { position:relative; }
.ico { position:absolute; left:10px; top:50%; transform:translateY(-50%); font-size:12px; opacity:0.45; pointer-events:none; }
.finput {
  width:100%; background:var(--bg3); border:1px solid var(--bordergold);
  border-radius:var(--r); padding:8px 10px 8px 32px;
  color:var(--text); font-size:12px; outline:none;
  transition:border-color 0.2s,box-shadow 0.2s; font-family:'Inter',sans-serif;
}
.finput:focus { border-color:var(--gold); box-shadow:0 0 0 2px rgba(245,197,24,0.08); }
.finput::placeholder { color:var(--dark); font-size:11px; }
.eye { position:absolute; right:9px; top:50%; transform:translateY(-50%);
  background:none; border:none; color:var(--dim); font-size:13px; cursor:pointer; }

.broker-select {
  width:100%; background:var(--bg3); border:1px solid var(--bordergold);
  border-radius:var(--r); padding:8px 32px 8px 32px;
  color:var(--text); font-size:12px; outline:none; cursor:pointer;
  appearance:none; -webkit-appearance:none; font-family:'Inter',sans-serif;
}
.broker-select:focus { border-color:var(--gold); }
.barrow { position:absolute; right:10px; top:50%; transform:translateY(-50%); font-size:10px; color:var(--dim); pointer-events:none; }

/* LOGIN BTN */
.btn-login {
  width:100%; background:linear-gradient(135deg,var(--gold2),var(--gold));
  color:#000; border:none; border-radius:var(--r);
  padding:11px; font-size:13px; font-weight:700; cursor:pointer;
  font-family:'Rajdhani',sans-serif; letter-spacing:2px;
  box-shadow:0 3px 14px rgba(245,197,24,0.22);
  display:flex; align-items:center; justify-content:center; gap:8px;
  margin-top:2px;
}
.btn-login:active { transform:scale(0.98); }

/* DIVIDER */
.divider { display:flex; align-items:center; gap:8px; margin:2px 0; }
.dline { flex:1; height:1px; background:var(--border); }
.dtxt { font-size:8px; color:var(--dark); letter-spacing:1px; white-space:nowrap; }

/* GOOGLE + BIOMETRIC ROW */
.social-row { display:grid; grid-template-columns:1fr 1fr; gap:6px; }

.btn-google {
  display:flex; align-items:center; justify-content:center; gap:6px;
  background:var(--bg3); border:1px solid var(--border); border-radius:var(--r);
  padding:9px 8px; color:var(--text); font-size:11px; cursor:pointer;
  font-family:'Inter',sans-serif; transition:all 0.2s; font-weight:500;
}
.btn-google:active { border-color:#4285F4; background:#0d1a2e; }

.btn-bio {
  display:flex; align-items:center; justify-content:center; gap:6px;
  background:var(--bg3); border:1px solid var(--bordergold); border-radius:var(--r);
  padding:9px 8px; color:var(--text); font-size:11px; cursor:pointer;
  font-family:'Rajdhani',sans-serif; font-weight:700; letter-spacing:1px;
  animation:bioBorder 2.5s ease-in-out infinite; transition:all 0.2s;
}
.btn-bio:active { border-color:var(--gold); background:rgba(245,197,24,0.08); }
@keyframes bioBorder {
  0%,100% { box-shadow:0 0 0 0 rgba(245,197,24,0.3); }
  50% { box-shadow:0 0 0 4px rgba(245,197,24,0); }
}
.bio-finger { font-size:16px; animation:pulse 1.8s ease-in-out infinite; }
@keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.12)} }

/* FOOTER */
.footer {
  flex-shrink:0; text-align:center;
  padding:5px 16px 8px; border-top:1px solid var(--border);
}
.footer-secure { display:flex; align-items:center; justify-content:center; gap:4px; font-size:7px; color:var(--dark); }
.sdot { width:5px; height:5px; border-radius:50%; background:var(--green); }

/* OVERLAYS */
.overlay { position:fixed; inset:0; background:rgba(0,0,0,0.9);
  display:none; align-items:center; justify-content:center; flex-direction:column; gap:14px; z-index:100; }
.overlay.show { display:flex; }
.spinner { width:42px; height:42px; border:3px solid var(--border); border-top-color:var(--gold); border-radius:50%; animation:spin 0.8s linear infinite; }
@keyframes spin { to{transform:rotate(360deg)} }
.ov-text { font-family:'Rajdhani',sans-serif; font-size:13px; color:var(--gold); letter-spacing:2px; }

.success-icon { font-size:52px; animation:popIn 0.4s ease; }
@keyframes popIn { 0%{transform:scale(0)} 80%{transform:scale(1.1)} 100%{transform:scale(1)} }
.success-txt { font-family:'Rajdhani',sans-serif; font-size:18px; color:var(--green); font-weight:700; letter-spacing:2px; }
.success-sub { font-size:11px; color:var(--dim); }

/* PANIC OVERLAY */
.panic-overlay { position:fixed; inset:0; background:rgba(139,0,0,0.95);
  display:none; align-items:center; justify-content:center; flex-direction:column; gap:16px; z-index:200; }
.panic-overlay.show { display:flex; }
.panic-icon { font-size:60px; animation:shake 0.4s ease infinite alternate; }
@keyframes shake { 0%{transform:rotate(-5deg)} 100%{transform:rotate(5deg)} }
.panic-txt { font-family:'Rajdhani',sans-serif; font-size:22px; color:#fff; font-weight:700; letter-spacing:2px; text-align:center; }
.panic-sub { font-size:12px; color:rgba(255,255,255,0.7); text-align:center; }
.panic-close { margin-top:8px; background:rgba(255,255,255,0.15); border:1px solid rgba(255,255,255,0.3); color:#fff; border-radius:var(--r); padding:10px 24px; font-size:12px; cursor:pointer; font-family:'Rajdhani',sans-serif; letter-spacing:1px; }

.toast { position:fixed; bottom:18px; left:50%; transform:translateX(-50%);
  background:var(--bg3); border:1px solid var(--bordergold); border-radius:30px;
  padding:7px 16px; font-size:11px; display:none; white-space:nowrap; z-index:300; }
.toast.show { display:block; }
</style>
</head>
<body>

<!-- LOADING -->
<div class="overlay" id="loadOv">
  <div class="spinner"></div>
  <div class="ov-text" id="loadTxt">VERIFYING...</div>
</div>

<!-- SUCCESS -->
<div class="overlay" id="successOv">
  <div class="success-icon">✅</div>
  <div class="success-txt">LOGIN SUCCESS</div>
  <div class="success-sub" id="successSub">Welcome back!</div>
</div>

<!-- PANIC OVERLAY -->
<div class="panic-overlay" id="panicOv">
  <div class="panic-icon">🚨</div>
  <div class="panic-txt">PANIC EXIT TRIGGERED!</div>
  <div class="panic-sub">सभी Positions Cut हो रही हैं...<br>All Open Positions Closing NOW</div>
  <div style="font-family:'Rajdhani',sans-serif;font-size:28px;color:#ff6b6b;font-weight:700" id="panicCount">Closing...</div>
  <button class="panic-close" onclick="closePanic()">✕ CANCEL / DISMISS</button>
</div>

<div class="toast" id="toast"></div>

<div class="screen">
  <div class="topline"></div>

  <!-- 🔱 PANIC TRISHUL — top right corner -->
  <div class="panic-trishul" onclick="doPanic()" title="Panic Exit — All Close">🔱</div>

  <!-- HEADER -->
  <div class="header">
    <div class="trinetra">👁</div>
    <div class="app-name">TRINETRA</div>
    <div class="app-sub">FOREX · COMMODITY · OPTIONS</div>
  </div>

  <!-- FORM -->
  <div class="form-area">

    <div>
      <label class="label">FULL NAME</label>
      <div class="input-wrap">
        <span class="ico">👤</span>
        <input class="finput" type="text" id="fullName" placeholder="Enter your full name" value="Trader">
      </div>
    </div>

    <div>
      <label class="label">PHONE</label>
      <div class="input-wrap">
        <span class="ico">📱</span>
        <input class="finput" type="tel" id="phone" placeholder="+1 XXX XXX XXXX" value="9800000000">
      </div>
    </div>

    <div>
      <label class="label">EMAIL</label>
      <div class="input-wrap">
        <span class="ico">✉️</span>
        <input class="finput" type="email" id="email" placeholder="your@email.com" value="trader@trinetra.ai">
      </div>
    </div>

    <div>
      <label class="label">PASSWORD</label>
      <div class="input-wrap">
        <span class="ico">🔒</span>
        <input class="finput" type="password" id="password" placeholder="Enter password" value="raksha">
        <button class="eye" onclick="togglePass()" id="eyeBtn">👁</button>
      </div>
    </div>

    <div>
      <label class="label">BROKER</label>
      <div class="input-wrap">
        <span class="ico">🏦</span>
        <select class="broker-select" id="brokerSel">
          <option value="">-- Choose Your Broker --</option>
          <option>OANDA</option>
          <option>Interactive Brokers</option>
          <option>IG Markets</option>
          <option>FOREX.com</option>
          <option selected>Pepperstone</option>
          <option>IC Markets</option>
          <option>Saxo Bank</option>
          <option>FXCM</option>
          <option>Binance (Crypto)</option>
          <option>Coinbase (Crypto)</option>
          <option>Yahoo Finance API</option>
        </select>
        <span class="barrow">▼</span>
      </div>
    </div>

    <!-- LOGIN -->
    <button class="btn-login" onclick="doLogin()">👁 LOGIN / REGISTER</button>

    <!-- DIVIDER -->
    <div class="divider">
      <div class="dline"></div>
      <div class="dtxt">OR</div>
      <div class="dline"></div>
    </div>

    <!-- GOOGLE + BIOMETRIC -->
    <div class="social-row">
      <button class="btn-google" onclick="doGoogle()">
        <svg width="14" height="14" viewBox="0 0 48 48">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        </svg>
        Gmail
      </button>
      <button class="btn-bio" onclick="doBio()">
        <span class="bio-finger">👆</span>
        Biometric
      </button>
    </div>

  </div>

  <!-- FOOTER -->
  <div class="footer">
    <div class="footer-secure">
      <div class="sdot"></div>
      <span>Biometric · TOTP · Broker · AWS · Gemini</span>
    </div>
    <div style="font-size:7px;color:var(--dark);margin-top:2px">Mogal Industries · Raksha © 2026</div>
  </div>

</div>

<script>
function togglePass() {
  const i = document.getElementById('password'), b = document.getElementById('eyeBtn');
  i.type = i.type==='password'?'text':'password';
  b.textContent = i.type==='password'?'👁':'🙈';
}
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}
function loading(txt) {
  document.getElementById('loadTxt').textContent = txt;
  document.getElementById('loadOv').classList.add('show');
}
function hideLoad() { document.getElementById('loadOv').classList.remove('show'); }
function success(name) {
  document.getElementById('successSub').textContent = 'Welcome, ' + name + ' 👁';
  document.getElementById('successOv').classList.add('show');
}
function doLogin() {
  if (!document.getElementById('fullName').value.trim()) { toast('⚠️ Enter full name'); return; }
  if (!document.getElementById('phone').value.trim()) { toast('⚠️ Enter phone number'); return; }
  if (!document.getElementById('email').value.trim()) { toast('⚠️ Enter email ID'); return; }
  if (!document.getElementById('password').value) { toast('⚠️ Enter password'); return; }
  if (!document.getElementById('brokerSel').value) { toast('⚠️ Select a broker'); return; }
  const name = document.getElementById('fullName').value.trim().split(' ')[0];
  loading('LAYER 1 — BIOMETRIC...');
  setTimeout(()=>{
    loading('LAYER 2 — TOTP CHECK...');
    setTimeout(()=>{
      loading('LAYER 3 — BROKER HANDSHAKE...');
      setTimeout(()=>{ hideLoad(); success(name); }, 900);
    }, 800);
  }, 800);
}
function doGoogle() {
  loading('GOOGLE AUTH...');
  setTimeout(()=>{ hideLoad(); success('Charan'); }, 1400);
}
function doBio() {
  loading('🔐 BIOMETRIC SCAN...');
  setTimeout(()=>{ hideLoad(); success('Charan'); }, 1200);
}
function doPanic() {
  document.getElementById('panicOv').classList.add('show');
  let count = 5;
  const el = document.getElementById('panicCount');
  el.textContent = 'Closing in ' + count + '...';
  const t = setInterval(()=>{
    count--;
    if (count > 0) { el.textContent = 'Closing in ' + count + '...'; }
    else { clearInterval(t); el.textContent = '✅ ALL POSITIONS CLOSED'; }
  }, 1000);
}
function closePanic() {
  document.getElementById('panicOv').classList.remove('show');
}
</script>
</body>
</html>
