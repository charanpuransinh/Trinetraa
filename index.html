<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#000000">
<title>TRINETRA — Mogal Industries · Raksha</title>

<!-- FONTS -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700;800&family=Orbitron:wght@700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<!-- ALL CSS FILES -->
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/login.css">
<link rel="stylesheet" href="css/home.css">
<link rel="stylesheet" href="css/power.css">
<link rel="stylesheet" href="css/scanner.css">
<link rel="stylesheet" href="css/chart.css">
<link rel="stylesheet" href="css/watchlist.css">
<link rel="stylesheet" href="css/admin.css">
<link rel="stylesheet" href="css/pages.css">

<style>
/* SPLASH (initial load) */
#splash{position:fixed;inset:0;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:99999;transition:opacity .4s}
#splash.hide{opacity:0;pointer-events:none}
.sp-eye{font-size:64px;filter:drop-shadow(0 0 18px rgba(255,109,0,.7));animation:spFloat 2s ease-in-out infinite}
@keyframes spFloat{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-8px) scale(1.05)}}
.sp-name{font-family:'Orbitron',sans-serif;font-size:30px;font-weight:900;color:var(--gold);letter-spacing:6px;margin-top:14px;text-shadow:0 0 18px rgba(255,109,0,.5)}
.sp-tag{font-size:9px;color:var(--dim);letter-spacing:3px;margin-top:4px}
.sp-bar{width:200px;height:3px;background:var(--bg4);margin-top:24px;overflow:hidden;position:relative}
.sp-fill{position:absolute;top:0;left:0;bottom:0;background:linear-gradient(90deg,var(--gold2),var(--gold));width:0;animation:spLoad 1.5s ease-out forwards;box-shadow:0 0 8px rgba(255,109,0,.6)}
@keyframes spLoad{0%{width:0}100%{width:100%}}
.sp-status{font-size:8px;color:var(--dim);letter-spacing:2px;margin-top:10px;font-family:'Rajdhani',sans-serif;font-weight:700}

/* PAGE LOADER FALLBACK */
.page-loader{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--dim);gap:12px}
.page-loader-spin{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--gold);animation:spin .8s linear infinite;border-radius:50%}
.page-error{padding:20px;text-align:center;color:#ff3d3d;font-size:12px;letter-spacing:1px}

/* PANIC OVERLAY */
.panic-overlay{position:fixed;inset:0;background:rgba(139,0,0,.95);display:none;align-items:center;justify-content:center;flex-direction:column;gap:16px;z-index:5000;padding:20px}
.panic-overlay.show{display:flex}
.panic-icon{font-size:60px;animation:shake .4s ease infinite alternate}
@keyframes shake{0%{transform:rotate(-5deg)}100%{transform:rotate(5deg)}}
.panic-txt{font-family:'Orbitron',sans-serif;font-size:18px;color:#fff;font-weight:800;letter-spacing:2px;text-align:center}
.panic-sub{font-size:11px;color:rgba(255,255,255,.75);text-align:center;line-height:1.5}
.panic-count{font-family:'Orbitron',sans-serif;font-size:24px;color:#ff6b6b;font-weight:800}
.panic-close{margin-top:6px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;padding:10px 24px;font-size:11px;cursor:pointer;font-family:'Rajdhani',sans-serif;letter-spacing:1.5px;font-weight:700}
</style>
</head>
<body>

<!-- SPLASH SCREEN -->
<div id="splash">
  <div class="sp-eye">👁</div>
  <div class="sp-name">TRINETRA</div>
  <div class="sp-tag">FOREX · COMMODITY · OPTIONS</div>
  <div class="sp-bar"><div class="sp-fill"></div></div>
  <div class="sp-status" id="spStatus">INITIALIZING SCANNERS…</div>
</div>

<!-- PANIC OVERLAY -->
<div class="panic-overlay" id="panicOv">
  <div class="panic-icon">🚨</div>
  <div class="panic-txt">PANIC EXIT TRIGGERED</div>
  <div class="panic-sub">सभी Positions Cut हो रही हैं<br>All Open Positions Closing NOW</div>
  <div class="panic-count" id="panicCount">Closing in 5...</div>
  <button class="panic-close" onclick="closePanic()">✕ CANCEL</button>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- MAIN APP -->
<div class="app" id="app">

  <!-- TOPBAR -->
  <div class="topbar" id="topbar">
    <div class="tb-title" id="tbTitle">👁 TRINETRA</div>
    <div class="tb-pill"><div class="live-dot"></div><span id="tbStatus">AI ACTIVE</span></div>
  </div>

  <!-- SWIPER (holds dynamically loaded page fragments) -->
  <div class="swiper" id="swiper">
    <div class="page" id="page-login"><div class="page-loader"><div class="page-loader-spin"></div><div>Loading Login…</div></div></div>
    <div class="page" id="page-home"><div class="page-loader"><div class="page-loader-spin"></div><div>Loading Home…</div></div></div>
    <div class="page" id="page-power"><div class="page-loader"><div class="page-loader-spin"></div><div>Loading Power…</div></div></div>
    <div class="page" id="page-signal"><div class="page-loader"><div class="page-loader-spin"></div><div>Loading Scanners…</div></div></div>
    <div class="page" id="page-chart"><div class="page-loader"><div class="page-loader-spin"></div><div>Loading Chart…</div></div></div>
    <div class="page" id="page-watchlist"><div class="page-loader"><div class="page-loader-spin"></div><div>Loading Watchlist…</div></div></div>
    <div class="page" id="page-admin"><div class="page-loader"><div class="page-loader-spin"></div><div>Loading Admin…</div></div></div>
  </div>

  <!-- PAGE INDICATOR DOTS -->
  <div class="dots" id="dots">
    <div class="dot active" data-page="login"></div>
    <div class="dot" data-page="home"></div>
    <div class="dot" data-page="power"></div>
    <div class="dot" data-page="signal"></div>
    <div class="dot" data-page="chart"></div>
    <div class="dot" data-page="watchlist"></div>
    <div class="dot" data-page="admin"></div>
  </div>

  <!-- BOTTOM NAV - 6 icons (login is hidden, accessed only initially) -->
  <div class="nav" id="nav">
    <button class="nav-btn active" data-page="home">
      <div class="nav-ico">🏠</div>
      <div class="nav-lbl">HOME</div>
    </button>
    <button class="nav-btn" data-page="power">
      <div class="nav-ico">⚡</div>
      <div class="nav-lbl">POWER</div>
    </button>
    <button class="nav-btn" data-page="signal">
      <div class="nav-ico">📡</div>
      <div class="nav-lbl">SIGNAL</div>
    </button>
    <button class="nav-btn" data-page="chart">
      <div class="nav-ico">📊</div>
      <div class="nav-lbl">CHART</div>
    </button>
    <button class="nav-btn" data-page="watchlist">
      <div class="nav-ico">⭐</div>
      <div class="nav-lbl">WATCH</div>
    </button>
    <button class="nav-btn" data-page="admin">
      <div class="nav-ico">⚙️</div>
      <div class="nav-lbl">ADMIN</div>
    </button>
  </div>

</div>

<!-- ========== APP CORE LOGIC ========== -->
<script>
/* ============================================================
   TRINETRA · Mogal Industries · Raksha · Author: Charan
   SPA loader for fragment-based pages
   ============================================================ */

const PAGES = ['login','home','power','signal','chart','watchlist','admin'];
const PAGE_TITLES = {
  login:'👁 TRINETRA',
  home:'👁 TRINETRA',
  power:'⚡ POWER CONTROL',
  signal:'📡 SCANNER MASTER',
  chart:'📊 LIVE CHART',
  watchlist:'⭐ WATCHLIST',
  admin:'⚙️ ADMIN PANEL'
};
const PAGE_STATUS = {
  login:'AUTH',
  home:'LIVE',
  power:'HYBRID',
  signal:'AI ACTIVE',
  chart:'LIVE',
  watchlist:'LIVE',
  admin:'CONFIG'
};

let currentPage = 'login';
let loaded = {};

/* TOAST */
function toast(msg, dur=2500) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), dur);
}

/* LOAD PAGE FRAGMENT */
async function loadPage(name) {
  if (loaded[name]) return true;
  const container = document.getElementById('page-' + name);
  if (!container) return false;
  try {
    const res = await fetch('pages/' + name + '.html', { cache: 'no-store' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const html = await res.text();
    container.innerHTML = html;

    // Execute any inline <script> tags inside the loaded fragment
    container.querySelectorAll('script').forEach(oldScript => {
      const newScript = document.createElement('script');
      if (oldScript.src) {
        newScript.src = oldScript.src;
      } else {
        newScript.textContent = oldScript.textContent;
      }
      oldScript.parentNode.replaceChild(newScript, oldScript);
    });

    loaded[name] = true;
    return true;
  } catch (e) {
    container.innerHTML = `<div class="page-error">⚠ Could not load ${name}.html<br><small style="color:#666;font-size:10px">${e.message}</small></div>`;
    return false;
  }
}

/* LOAD EXTERNAL PAGE-SPECIFIC JS (if exists) */
const PAGE_JS = ['utils','data','navigation','app','login','home','power','scanner','chart','watchlist','admin'];
function loadAllJS() {
  return new Promise((resolve)=>{
    let remaining = PAGE_JS.length;
    if (remaining === 0) { resolve(); return; }
    PAGE_JS.forEach(name => {
      const s = document.createElement('script');
      s.src = 'js/' + name + '.js';
      s.async = false;
      s.onload = () => { if (--remaining === 0) resolve(); };
      s.onerror = () => { if (--remaining === 0) resolve(); }; // don't fail if missing
      document.body.appendChild(s);
    });
  });
}

/* NAVIGATE TO PAGE */
async function navTo(name) {
  if (!PAGES.includes(name)) return;

  // Load fragment if not loaded
  await loadPage(name);

  // Scroll the swiper to the page
  const idx = PAGES.indexOf(name);
  const swiper = document.getElementById('swiper');
  swiper.scrollTo({ left: swiper.clientWidth * idx, behavior: 'smooth' });

  currentPage = name;
  updateUI();
}

/* UPDATE TOPBAR + DOTS + NAV ACTIVE STATE */
function updateUI() {
  document.getElementById('tbTitle').textContent = PAGE_TITLES[currentPage] || '👁 TRINETRA';
  document.getElementById('tbStatus').textContent = PAGE_STATUS[currentPage] || 'LIVE';

  document.querySelectorAll('.dot').forEach(d => {
    d.classList.toggle('active', d.dataset.page === currentPage);
  });
  document.querySelectorAll('.nav-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.page === currentPage);
  });

  // Hide topbar+nav on login page (login has its own layout)
  const isLogin = currentPage === 'login';
  document.getElementById('topbar').style.display = isLogin ? 'none' : 'flex';
  document.getElementById('nav').style.display = isLogin ? 'none' : 'flex';
  document.getElementById('dots').style.display = isLogin ? 'none' : 'flex';

  // Fire page-specific event so each page's init() runs every time
  window.dispatchEvent(new CustomEvent('page:' + currentPage));
}

/* SWIPE DETECTION */
let swiperEl;
function setupSwipe() {
  swiperEl = document.getElementById('swiper');
  let scrollTimer;
  swiperEl.addEventListener('scroll', () => {
    clearTimeout(scrollTimer);
    scrollTimer = setTimeout(() => {
      const idx = Math.round(swiperEl.scrollLeft / swiperEl.clientWidth);
      const name = PAGES[idx];
      if (name && name !== currentPage) {
        currentPage = name;
        loadPage(name);
        updateUI();
      }
    }, 100);
  });
}

/* NAV BUTTON CLICKS */
document.addEventListener('click', e => {
  const navBtn = e.target.closest('.nav-btn');
  if (navBtn) { navTo(navBtn.dataset.page); return; }
  const dot = e.target.closest('.dot');
  if (dot) { navTo(dot.dataset.page); return; }
});

/* GLOBAL FUNCTIONS THAT LOGIN PAGE CALLS */
function doLogin() {
  toast('🔐 Authenticating…');
  setTimeout(() => {
    toast('✅ Welcome, Charan');
    setTimeout(() => navTo('home'), 800);
  }, 1200);
}
function doBio() {
  toast('🔐 Biometric scan…');
  setTimeout(() => {
    toast('✅ Bio unlock OK');
    setTimeout(() => navTo('home'), 800);
  }, 1100);
}
function panicExit() {
  document.getElementById('panicOv').classList.add('show');
  let count = 5;
  const el = document.getElementById('panicCount');
  el.textContent = 'Closing in ' + count + '...';
  const t = setInterval(() => {
    count--;
    if (count > 0) el.textContent = 'Closing in ' + count + '...';
    else { clearInterval(t); el.textContent = '✅ ALL POSITIONS CLOSED'; }
  }, 1000);
}
function closePanic() { document.getElementById('panicOv').classList.remove('show'); }

/* INIT */
async function init() {
  setupSwipe();

  // Update splash status
  const sp = document.getElementById('spStatus');
  sp.textContent = 'LOADING SCANNERS…';

  // Load login page first (visible immediately)
  await loadPage('login');

  // Pre-load other pages in background (so they're instant when swiped)
  setTimeout(() => {
    PAGES.filter(p => p !== 'login').forEach(p => loadPage(p));
  }, 300);

  // Load all JS modules (utils, data, etc.)
  await loadAllJS();

  // Hide splash after delay
  setTimeout(() => {
    document.getElementById('splash').classList.add('hide');
    updateUI();
  }, 1500);
}

window.addEventListener('DOMContentLoaded', init);

/* expose functions globally so fragment HTML onclick="..." works */
window.navTo = navTo;
window.doLogin = doLogin;
window.doBio = doBio;
window.panicExit = panicExit;
window.closePanic = closePanic;
window.toast = toast;
</script>

</body>
  </html>
