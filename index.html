<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>TRINETRA FINAL FIX</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700;800&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/login.css">
<link rel="stylesheet" href="css/pages.css">
<style>
  /* FORCING NEW DESIGN OVER OLD CSS */
  body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000 !important; }
  
  .app {
    display: flex !important;
    flex-direction: column !important;
    height: 100vh !important;
    width: 100vw !important;
    max-width: 100% !important;
    overflow: hidden !important;
    background: #000 !important;
  }

  /* FORCED TOP HEADER - EXIT BUTTON HERE */
  .forced-header {
    display: flex !important;
    justify-content: space-between !important;
    align-items: center !important;
    padding: 10px 15px !important;
    background: #0a0a0a !important;
    border-bottom: 2px solid #ff6d0080 !important;
    z-index: 9999 !important;
    flex-shrink: 0 !important;
  }

  .exit-round-btn {
    width: 35px !important;
    height: 35px !important;
    border-radius: 50% !important;
    background: rgba(255, 61, 61, 0.15) !important;
    border: 2px solid #ff3d3d !important;
    color: #ff3d3d !important;
    font-size: 16px !important;
    font-family: 'Orbitron', sans-serif !important;
    font-weight: 900 !important;
    display: flex !important;
    align-items: center !important;
    justify-content: center !important;
    cursor: pointer !important;
  }

  .swiper {
    flex: 1 !important;
    display: flex !important;
    overflow-x: auto !important;
    scroll-snap-type: x mandatory !important;
    scrollbar-width: none !important;
  }

  #page-home-container, #page-signal-container, #page-power-container, 
  #page-chart-container, #page-watchlist-container, #page-admin-container {
    min-width: 100vw !important;
    width: 100vw !important;
    height: 100% !important;
    scroll-snap-align: start !important;
    flex-shrink: 0 !important;
  }

  .nav {
    height: 70px !important;
    background: #0a0a0a !important;
    border-top: 1px solid #ff6d0040 !important;
    display: flex !important;
    padding-bottom: env(safe-area-inset-bottom) !important;
    flex-shrink: 0 !important;
    z-index: 9999 !important;
  }
</style>
</head>
<body>

<div id="loginContainer"></div>

<div class="app" id="appShell" style="display:none">
  
  <div class="forced-header">
    <div style="color:#ff6d00; font-family:'Orbitron'; font-size:18px; font-weight:900;">TRINETRA</div>
    <div class="exit-round-btn" onclick="location.reload()">X</div>
  </div>

  <div class="swiper" id="swiper">
    <div id="page-home-container"></div>
    <div id="page-signal-container"></div>
    <div id="page-power-container"></div>
    <div id="page-chart-container"></div>
    <div id="page-watchlist-container"></div>
    <div id="page-admin-container"></div>
  </div>

  <div class="nav">
    <button class="nav-btn active" onclick="navTo(0)"><div class="nav-ico">🏠</div><div class="nav-lbl">HOME</div></button>
    <button class="nav-btn" onclick="navTo(1)"><div class="nav-ico">📡</div><div class="nav-lbl">SIG</div></button>
    <button class="nav-btn" onclick="navTo(2)"><div class="nav-ico">⚡</div><div class="nav-lbl">PWR</div></button>
    <button class="nav-btn" onclick="navTo(3)"><div class="nav-ico">📊</div><div class="nav-lbl">CHART</div></button>
    <button class="nav-btn" onclick="navTo(4)"><div class="nav-ico">⭐</div><div class="nav-lbl">WATCH</div></button>
    <button class="nav-btn" onclick="navTo(5)"><div class="nav-ico">⚙️</div><div class="nav-lbl">ADMIN</div></button>
  </div>
</div>

<script>
async function loadPage(f, t) {
  try {
    const res = await fetch('pages/' + f);
    const html = await res.text();
    document.getElementById(t).innerHTML = html;
  } catch (e) { console.error(f); }
}

async function loadAllPages() {
  await Promise.all([
    loadPage('login.html', 'loginContainer'),
    loadPage('home.html', 'page-home-container'),
    loadPage('signal.html', 'page-signal-container'),
    loadPage('power.html', 'page-power-container'),
    loadPage('chart.html', 'page-chart-container'),
    loadPage('watchlist.html', 'page-watchlist-container'),
    loadPage('admin.html', 'page-admin-container'),
  ]);
  const ds = document.createElement('script'); ds.src = 'js/data.js'; document.body.appendChild(ds);
  const ms = document.createElement('script'); ms.src = 'js/main.js'; document.body.appendChild(ms);
}

window.onload = loadAllPages;

function navTo(idx) {
  const swiper = document.getElementById('swiper');
  swiper.scrollTo({ left: idx * window.innerWidth, behavior: 'smooth' });
  const btns = document.querySelectorAll('.nav-btn');
  btns.forEach((b, i) => {
    if(i === idx) b.classList.add('active');
    else b.classList.remove('active');
  });
}
</script>
</body>
</html>
