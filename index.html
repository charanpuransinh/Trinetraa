<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>TRINETRA TERMINAL - V3</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700;800&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/login.css">
<link rel="stylesheet" href="css/pages.css">

<style>
  /* सफ़ेद स्क्रीन को रोकने के लिए जबरदस्ती ब्लैक बैकग्राउंड */
  body, html {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    overflow: hidden; 
    background-color: #000000 !important;
    color: #ffffff;
  }
  
  /* मुख्य ढांचा - V3 */
  .app-wrapper-v3 {
    width: 100vw !important;
    height: 100vh !important;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
    background: #000;
  }
  
  /* ऊपर का हिस्सा (Header) जहाँ Exit बटन है */
  .header-top-v3 {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 18px;
    background: #0a0a0a;
    border-bottom: 2px solid #ff6d0080;
    z-index: 9999; 
    flex-shrink: 0;
  }

  /* गोल लाल बटन - ऊपर के लिए */
  .exit-round-v3 {
    width: 36px;
    height: 36px;
    border-radius: 50% !important;
    background: rgba(255, 61, 61, 0.2);
    border: 2px solid #ff3d3d;
    color: #ff3d3d;
    font-size: 16px;
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    box-shadow: 0 0 12px rgba(255, 61, 61, 0.3);
  }

  .exit-round-v3:active {
    background: #ff3d3d;
    color: #000;
  }

  /* स्वाइप एरिया */
  .main-swiper-v3 {
    flex: 1;
    display: flex;
    overflow-x: auto;
    scroll-snap-type: x mandatory;
    scrollbar-width: none;
    background: #000;
  }
  .main-swiper-v3::-webkit-scrollbar { display: none; }

  .page-box-v3 {
    min-width: 100vw;
    width: 100vw;
    height: 100%;
    scroll-snap-align: start;
    flex-shrink: 0;
    overflow-y: auto;
  }

  /* नीचे के नेविगेशन आइकन */
  .bottom-nav-v3 {
    height: 75px;
    background: #0a0a0a;
    border-top: 1px solid #ff6d0040;
    display: flex;
    padding-bottom: env(safe-area-inset-bottom);
    flex-shrink: 0;
    z-index: 9999;
  }
</style>
</head>
<body style="background-color: #000;">

<div id="loginContainer"></div>

<div class="app-wrapper-v3" id="appShell" style="display:none">
  
  <div class="header-top-v3">
    <div style="color:#ff6d00; font-family:'Orbitron'; font-size:20px; font-weight:900; letter-spacing:1px;">TRINETRA</div>
    <div class="exit-round-v3" onclick="window.location.reload()">X</div>
  </div>

  <div class="main-swiper-v3" id="swiper">
    <div class="page-box-v3" id="page-home-container"></div>
    <div class="page-box-v3" id="page-signal-container"></div>
    <div class="page-box-v3" id="page-power-container"></div>
    <div class="page-box-v3" id="page-chart-container"></div>
    <div class="page-box-v3" id="page-watchlist-container"></div>
    <div class="page-box-v3" id="page-admin-container"></div>
  </div>

  <div class="bottom-nav-v3">
    <button class="nav-btn active" onclick="navTo(0)">
      <div class="nav-ico">🏠</div><div class="nav-lbl">HOME</div>
    </button>
    <button class="nav-btn" onclick="navTo(1)">
      <div class="nav-ico">📡</div><div class="nav-lbl">SIG</div>
    </button>
    <button class="nav-btn" onclick="navTo(2)">
      <div class="nav-ico">⚡</div><div class="nav-lbl">PWR</div>
    </button>
    <button class="nav-btn" onclick="navTo(3)">
      <div class="nav-ico">📊</div><div class="nav-lbl">CHART</div>
    </button>
    <button class="nav-btn" onclick="navTo(4)">
      <div class="nav-ico">⭐</div><div class="nav-lbl">WATCH</div>
    </button>
    <button class="nav-btn" onclick="navTo(5)">
      <div class="nav-ico">⚙️</div><div class="nav-lbl">ADMIN</div>
    </button>
  </div>
</div>

<script>
// पेजों को लोड करने का सिस्टम
async function loadPage(file, target) {
  try {
    const res = await fetch('pages/' + file);
    const html = await res.text();
    document.getElementById(target).innerHTML = html;
  } catch (e) { console.error('Error loading:', file); }
}

async function loadAllPages() {
  await Promise.all([
    loadPage('login.html', 'loginContainer'),
    loadPage('home.html', 'page-home-container'),
    loadPage('signal.html', 'page-signal-container'),
    loadPage('power.html', 'page-power-container'),
    loadPage('chart.html', 'page-chart-container'),
    loadPage('watchlist.html', 'page-watchlist-container'),
    loadPage('admin.html', 'page-admin-container'),
  ]);
  
  // पुरानी JS फाइलों को यहाँ से कनेक्ट किया है
  const ds = document.createElement('script'); ds.src = 'js/data.js'; document.body.appendChild(ds);
  const ms = document.createElement('script'); ms.src = 'js/main.js'; document.body.appendChild(ms);
}

window.onload = loadAllPages;

// नेविगेशन कंट्रोल
function navTo(idx) {
  const swiper = document.getElementById('swiper');
  swiper.scrollTo({ left: idx * window.innerWidth, behavior: 'smooth' });
  const btns = document.querySelectorAll('.nav-btn');
  btns.forEach((b, i) => {
    if(i === idx) b.classList.add('active');
    else b.classList.remove('active');
  });
}
</script>

</body>
</html>
