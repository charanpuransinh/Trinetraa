<!-- ADMIN / MASTER CONTROL PAGE -->
<div class="page" id="page-admin">
  <div class="topbar">
    <div class="tb-title">Trinetra Pro — Master Control</div>
    <div class="tb-pill"><div class="live-dot"></div>ACTIVE</div>
  </div>

  <div class="ad-h">
    <div class="ad-t">⚙️ MASTER CONTROL</div>
  </div>

  <div class="ad-c">

    <!-- PROFILE CARD -->
    <div class="prof">
      <div class="prof-l">
        <div class="av" id="avLetter">T<div class="av-d"></div></div>
        <div class="prof-i">
          <div class="prof-id" id="profId">ID: Trader007</div>
          <div class="prof-st"><div class="s-dot"></div>ACTIVE · PEPPERSTONE</div>
          <div class="prof-c">📞 +91 98XXX XXXXX</div>
          <div class="prof-c">📧 trader@trinetra.ai</div>
        </div>
      </div>
      <button class="theme-btn" id="themeBtn" onclick="toggleTheme()">☀️ LIGHT</button>
    </div>

    <!-- P&L SECTION -->
    <div class="pnl">
      <div class="tabs">
        <button class="tab active" onclick="setTab(this,'1D')">1 DAY</button>
        <button class="tab" onclick="setTab(this,'1W')">1 WEEK</button>
        <button class="tab" onclick="setTab(this,'1M')">1 MONTH</button>
      </div>
      <div class="pnl-m">
        <span class="pnl-l">💰 NET P&L:</span>
        <span class="pnl-v" id="pnlVal">+$245.50</span>
      </div>
      <div class="pnl-s">
        <span>📊 Trades: <b id="trades">14</b></span>
        <span>🎯 Accuracy: <b id="acc">78%</b></span>
      </div>
    </div>

    <!-- QUICK NAVIGATION BUTTONS -->
    <div class="nav-list">
      <div class="nav-row" onclick="navTo('home')">
        <div class="nav-row-l">
          <span class="nav-row-ic">🏠</span>
          <span class="nav-row-name">HOME PAGE</span>
        </div>
        <button class="nav-go-btn">GO →</button>
      </div>

      <div class="nav-row" onclick="navTo('signal')">
        <div class="nav-row-l">
          <span class="nav-row-ic">📡</span>
          <span class="nav-row-name">SIGNAL PAGE</span>
        </div>
        <button class="nav-go-btn">GO →</button>
      </div>

      <div class="nav-row" onclick="navTo('power')">
        <div class="nav-row-l">
          <span class="nav-row-ic">⚡</span>
          <span class="nav-row-name">POWER CONTROL</span>
        </div>
        <button class="nav-go-btn">GO →</button>
      </div>

      <div class="nav-row" onclick="navTo('watchlist')">
        <div class="nav-row-l">
          <span class="nav-row-ic">📋</span>
          <span class="nav-row-name">WATCHLIST</span>
        </div>
        <button class="nav-go-btn">GO →</button>
      </div>

      <div class="nav-row" onclick="navTo('chart')">
        <div class="nav-row-l">
          <span class="nav-row-ic">📊</span>
          <span class="nav-row-name">CHART PAGE</span>
        </div>
        <button class="nav-go-btn">GO →</button>
      </div>
    </div>

    <!-- LOGOUT BUTTON -->
    <button class="logout-btn" onclick="doLogout()">⏻ LOGOUT (निकास)</button>

  </div>
</div>
